<div class="informes-page">
  <button class="back-btn" (click)="volver()">Volver</button>

  <div class="informes-container">
    <div class="informes-header">
      <h1>Generación de Reportes</h1>
    </div>

    <!-- Reporte de Uso de Laboratorios -->
    <div class="reporte-card">
      <div class="card-header">
        <div class="card-icon blue">📊</div>
        <h2>Reportes de Uso de Laboratorios</h2>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>Período</label>
          <select [(ngModel)]="reporteUso.periodo">
            <option value="semanal">Semanal</option>
            <option value="mensual">Mensual</option>
            <option value="trimestral">Trimestral</option>
            <option value="anual">Anual</option>
          </select>
        </div>

        <div class="form-group">
          <label>Laboratorio</label>
          <select [(ngModel)]="reporteUso.laboratorio">
            <option value="todos">Todos los laboratorios</option>
            <option value="lab-a">Lab Computación A</option>
            <option value="lab-b">Lab Computación B</option>
            <option value="lab-fisica">Lab Física</option>
            <option value="lab-quimica">Lab Química</option>
          </select>
        </div>

        <button class="btn-generar blue" (click)="generarReporteUso()">
          <span class="icon">📥</span>
          Generar Reporte PDF
        </button>
      </div>
    </div>

    <!-- Reporte de Fallas -->
    <div class="reporte-card">
      <div class="card-header">
        <div class="card-icon red">⚠️</div>
        <h2>Reportes de Fallas</h2>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>Período</label>
          <select [(ngModel)]="reporteFallas.periodo">
            <option value="ultima-semana">Última semana</option>
            <option value="ultimo-mes">Último mes</option>
            <option value="ultimo-trimestre">Último trimestre</option>
          </select>
        </div>

        <div class="form-group">
          <label>Estado</label>
          <select [(ngModel)]="reporteFallas.estado">
            <option value="todos">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="en-proceso">En Proceso</option>
            <option value="resuelto">Resuelto</option>
          </select>
        </div>

        <button class="btn-generar red" (click)="generarReporteFallas()">
          <span class="icon">📥</span>
          Generar Reporte PDF
        </button>
      </div>
    </div>

    <!-- Reporte de Inventario -->
    <div class="reporte-card">
      <div class="card-header">
        <div class="card-icon green">💻</div>
        <h2>Reporte de Inventario</h2>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>Tipo de Reporte</label>
          <select [(ngModel)]="reporteInventario.tipo">
            <option value="completo">Inventario Completo</option>
            <option value="operativos">Solo Operativos</option>
            <option value="mantenimiento">En Mantenimiento</option>
            <option value="baja">Dados de Baja</option>
          </select>
        </div>

        <div class="form-group">
          <label>Laboratorio</label>
          <select [(ngModel)]="reporteInventario.laboratorio">
            <option value="todos">Todos</option>
            <option value="lab-a">Lab Computación A</option>
            <option value="lab-b">Lab Computación B</option>
            <option value="lab-fisica">Lab Física</option>
            <option value="lab-quimica">Lab Química</option>
          </select>
        </div>

        <button class="btn-generar green" (click)="generarReporteInventario()">
          <span class="icon">📥</span>
          Generar Reporte PDF
        </button>
      </div>
    </div>
  </div>
</div>
