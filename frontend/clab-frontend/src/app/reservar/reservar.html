<div class="reservar-page">

  <button class="back-btn" (click)="volver()">← Volver</button>

  <div class="reservar-card">

    <h1 class="title">RESERVA DE LABORATORIO</h1>

    <div class="form-group">
      <label>Laboratorio</label>
      <select [(ngModel)]="laboratorio">
        <option>Lab A</option>
        <option>Lab B</option>
        <option>Lab C</option>
      </select>
    </div>

    <div class="form-group">
      <label>Fecha</label>
      <input type="date" [(ngModel)]="fecha">
    </div>

    <div class="form-group">
      <label>Horario</label>
      <select [(ngModel)]="hora">
        <option>07:30 - 10:30</option>
        <option>10:30 - 12:30</option>
        <option>12:30 - 14:30</option>
      </select>
    </div>

    <button class="btn-primary" (click)="guardar()">Guardar</button>

  </div>
</div>
