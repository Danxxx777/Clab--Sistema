<div class="card">
  <h2>RESERVA DE LABORATORIO</h2>
  <label>Laboratorio</label>
  <select [(ngModel)]="laboratorio">
    <option>Lab A</option><option>Lab B</option>
  </select>
  <label>Fecha</label>
  <input type="date" [(ngModel)]="fecha">
  <label>Horario</label>
  <select [(ngModel)]="hora">
    <option>07:30-10:30</option>
    <option>10:30-12:30</option>
    <option>12:30-14:30</option>
  </select>
  <button (click)="guardar()">Guardar</button>
</div>
