<div class="reservas-page">
  <button class="back-btn" (click)="volver()">Volver</button>

  <div class="reservas-container">
    <div class="reservas-header">
      <h1>Gestión de Reservas</h1>
      <div class="header-actions">
        <button class="btn-import" (click)="importarHorarios()">
          Importar Horarios SGA
        </button>
        <button class="btn-nueva" (click)="nuevaReserva()">
          Nueva Reserva
        </button>
      </div>
    </div>

    <div class="reservas-table-container">
      <div class="table-wrapper">
        <table class="reservas-table">
          <thead>
          <tr>
            <th>LABORATORIO</th>
            <th>FECHA</th>
            <th>HORARIO</th>
            <th>ASIGNATURA</th>
            <th>RESPONSABLE</th>
            <th>ESTADO</th>
            <th>ACCIONES</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let reserva of reservas">
            <td>{{reserva.laboratorio}}</td>
            <td>{{reserva.fecha}}</td>
            <td>{{reserva.horario}}</td>
            <td>{{reserva.asignatura}}</td>
            <td>{{reserva.responsable}}</td>
            <td>
                <span class="estado-badge" [ngClass]="reserva.estado.toLowerCase()">
                  {{reserva.estado}}
                </span>
            </td>
            <td>
              <div class="action-buttons">
                <button class="btn-edit" (click)="editar(reserva)" title="Editar">✏️</button>
                <button class="btn-delete" (click)="eliminar(reserva)" title="Eliminar">🗑️</button>
              </div>
            </td>
          </tr>
          <tr *ngIf="reservas.length === 0">
            <td colspan="7" class="empty-state">
              <div class="empty-icon">📅</div>
              <p>No hay reservas registradas</p>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
