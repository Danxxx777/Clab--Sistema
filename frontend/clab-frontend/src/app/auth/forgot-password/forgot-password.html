<div class="auth-page">
  <div class="auth-card">

    <h2>Recuperar contraseña</h2>
    <p>Ingresa tu correo para recibir el enlace de recuperación</p>

    <form (ngSubmit)="enviar()">
      <div class="form-group">
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Correo electrónico"
          required
        />
      </div>

      <button type="submit" class="btn-primary">
        Enviar enlace
      </button>
    </form>

    <p class="mensaje" *ngIf="mensaje">
      {{ mensaje }}
    </p>

    <a routerLink="/login" class="volver">
      ← Volver al login
    </a>

  </div>
</div>//
