<div class="auth-page">
  <div class="auth-card">

    <div class="auth-icon">📧</div>
    <h2>Recuperar contraseña</h2>
    <p>Ingresa tu correo y te enviaremos un código de verificación</p>

    <form (ngSubmit)="enviar()">
      <div class="form-group">
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Correo electrónico"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando">
        <span *ngIf="!cargando">Enviar código</span>
        <span *ngIf="cargando" class="dots">
          <span></span><span></span><span></span>
        </span>
      </button>
    </form>

    <p class="msg-error" *ngIf="error">{{ error }}</p>
    <p class="msg-exito" *ngIf="mensaje">{{ mensaje }}</p>

    <a routerLink="/login" class="volver">← Volver al login</a>

  </div>
</div>
