<div class="auth-page">
  <div class="auth-card">

    <div class="auth-icon">🔑</div>
    <h2>Nueva contraseña</h2>
    <p>Ingresa tu nueva contraseña para <strong>{{ email }}</strong></p>

    <form (ngSubmit)="cambiar()">
      <div class="form-group">
        <input
          type="password"
          [(ngModel)]="nuevaPassword"
          name="nuevaPassword"
          placeholder="Nueva contraseña"
          required
        />
      </div>
      <div class="form-group">
        <input
          type="password"
          [(ngModel)]="confirmarPassword"
          name="confirmarPassword"
          placeholder="Confirmar contraseña"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando">
        <span *ngIf="!cargando">Cambiar contraseña</span>
        <span *ngIf="cargando" class="dots">
          <span></span><span></span><span></span>
        </span>
      </button>
    </form>

    <p class="msg-error" *ngIf="error">{{ error }}</p>
    <p class="msg-exito" *ngIf="mensaje">{{ mensaje }}</p>

    <a routerLink="/login" class="volver">← Volver al login</a>

  </div>
</div>
