<div class="auth-page">
  <div class="auth-card">

    <h2>Nueva contraseña</h2>
    <p>Ingresa tu nueva contraseña</p>

    <form (ngSubmit)="cambiar()">
      <div class="form-group">
        <input
          type="password"
          [(ngModel)]="nuevaPassword"
          name="nuevaPassword"
          placeholder="Nueva contraseña"
          required
        />
      </div>

      <button type="submit" class="btn-primary">
        Cambiar contraseña
      </button>
    </form>

    <p class="mensaje" *ngIf="mensaje">
      {{ mensaje }}
    </p>
    <a routerLink="/login" class="volver">
      ← Volver al login
    </a>


  </div>
</div>
