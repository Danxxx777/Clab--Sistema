<div class="login-container">
  <div class="login-card">
    <a
      href="https://www.uteq.edu.ec"
      target="_blank"
      class="logo-link"
    >
      <img
        src="/LogoUTEQ.png"
        alt="Logo UTEQ"
        class="logo-universidad"
      />
    </a>

    <h2>BIENVENIDO A CLAB</h2>
    <p>Ingrese sus credenciales para ingresar al sistema</p>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Usuario</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Ingrese su nombre de usuario"
          required
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingrese su contraseña"
          required
        />
      </div>

      <button type="submit">Iniciar sesión</button>
    </form>

  </div>
</div>
