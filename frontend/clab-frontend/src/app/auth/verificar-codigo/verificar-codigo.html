<div class="auth-page">
  <div class="auth-card">

    <div class="auth-icon">🔐</div>
    <h2>Verificar código</h2>
    <p>Ingresa el código de 6 dígitos que enviamos a <strong>{{ email }}</strong></p>

    <form (ngSubmit)="verificar()">
      <div class="form-group">
        <input
          type="text"
          [(ngModel)]="codigo"
          name="codigo"
          placeholder="000000"
          maxlength="6"
          class="input-codigo"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando">
        <span *ngIf="!cargando">Verificar código</span>
        <span *ngIf="cargando" class="dots">
          <span></span><span></span><span></span>
        </span>
      </button>
    </form>

    <p class="msg-error" *ngIf="error">{{ error }}</p>

    <p class="reenviar">
      ¿No recibiste el código?
      <button class="btn-link" (click)="reenviar()">Reenviar</button>
    </p>

    <a routerLink="/forgot-password" class="volver">← Cambiar correo</a>

  </div>
</div>
