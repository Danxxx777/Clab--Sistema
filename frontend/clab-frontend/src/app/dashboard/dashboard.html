<button class="logout" (click)="logout()">Cerrar sesión</button>

<div class="page">
  <div class="card">

    <h1 class="title">MENÚ CLAB</h1>



    <div class="menu-list">

      <div class="menu-item" (click)="goTo('reservar')">
        <span class="icon">ℹ️</span>
        <div class="text">
          <strong>Reservar Laboratorio</strong>
          <p>Crear una nueva reserva</p>
        </div>
      </div>

      <div class="menu-item" (click)="goTo('horarios')">
        <span class="icon">📅</span>
        <div class="text">
          <strong>Horarios Reservados</strong>
          <p>Ver reservas activas</p>
        </div>
      </div>

      <!-- NUEVO: Agregar este item para Equipos -->
      <div class="menu-item info" (click)="goTo('equipos')">
        <span class="icon">💻</span>
        <div class="text">
          <strong>Equipos</strong>
          <p>Gestión de inventario</p>
        </div>
      </div>

      <div class="menu-item warning" (click)="goTo('reportar')">
        <span class="icon">⚠️</span>
        <div class="text">
          <strong>Reportar Fallas</strong>
          <p>Notificar problemas técnicos</p>
        </div>
      </div>

      <div class="menu-item info" (click)="goTo('notificaciones')">
        <span class="icon">🔔</span>
        <div class="text">
          <strong>Notificaciones</strong>
          <p>Mensajes del sistema</p>
        </div>
      </div>

    </div>

  </div>
</div>
